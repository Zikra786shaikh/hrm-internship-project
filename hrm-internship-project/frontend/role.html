<!DOCTYPE html>
<html>
<head>
    <title>Role Management</title>
</head>
<body>

<h2>Role Management</h2>

<!-- Add Role -->
<h3>Add Role</h3>
<input type="text" id="roleName" placeholder="Enter Role Name">
<input type="text" id="permissions" placeholder="Enter permissions (comma separated)">
<button onclick="addRole()">Add Role</button>

<h3>Active Roles</h3>
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Permissions</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="roleTable"></tbody>
</table>

<h3>Deleted Roles</h3>
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Permissions</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="deletedRoleTable"></tbody>
</table>

<script>
const BASE_URL = "https://hrm-backend-al8a.onrender.com"// replace this

// Load roles
async function loadRoles() {
    const res = await fetch(`${BASE_URL}/get_roles`);
    const data = await res.json();

    let table = "";
    data.forEach(role => {
        table += `
        <tr>
            <td>${role.id}</td>
            <td>${role.name}</td>
            <td>${role.permissions.join(", ")}</td>
            <td>
                <button onclick="deleteRole(${role.id})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("roleTable").innerHTML = table;
}

// Load deleted roles
async function loadDeletedRoles() {
    const res = await fetch(`${BASE_URL}/get_deleted_roles`);
    const data = await res.json();

    let table = "";
    data.forEach(role => {
        table += `
        <tr>
            <td>${role.id}</td>
            <td>${role.name}</td>
            <td>${role.permissions.join(", ")}</td>
            <td>
                <button onclick="restoreRole(${role.id})">Restore</button>
            </td>
        </tr>`;
    });

    document.getElementById("deletedRoleTable").innerHTML = table;
}

// Add role
async function addRole() {
    const name = document.getElementById("roleName").value;
    const permissions = document.getElementById("permissions").value.split(",")
    .map(p => p.trim());
    await fetch(`${BASE_URL}/add_role`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, permissions })
    });

    loadRoles();
}

// Delete role
async function deleteRole(id) {
    await fetch(`${BASE_URL}/delete_role/${id}`, {
        method: "DELETE"
    });

    loadRoles();
    loadDeletedRoles();
}

// Restore role
async function restoreRole(id) {
    await fetch(`${BASE_URL}/restore_role/${id}`, {
        method: "PUT"
    });

    loadRoles();
    loadDeletedRoles();
}

loadRoles();
loadDeletedRoles();
</script>

</body>
</html>
