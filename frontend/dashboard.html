<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script>
const role = localStorage.getItem("role");

// ❌ If not logged in
if (!role) {
    alert("Please login first");
    window.location.href = "index.html";
}
</script>

<body>

<div class="container mt-4">

    <h2 class="text-center">HRM Dashboard</h2>

    <div class="text-center mt-3">
        <h5>Logged in as: <span id="userRole"></span></h5>
    </div>

    <!-- Department (ONLY ADMIN) -->
    <div id="departmentSection" class="card p-3 mt-4">
        <h4>Department Management</h4>

        <input type="text" id="dept_name" class="form-control mb-2" placeholder="Department Name">
        <input type="text" id="description" class="form-control mb-2" placeholder="Description">

        <button onclick="addDepartment()" class="btn btn-primary">Add</button>
        <a href="deleted.html">View Deleted Departments</a>

        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="deptTable"></tbody>
        </table>
    </div>

    <!-- ROLE BUTTON -->
    <div class="text-center mt-4">
        <button onclick="goRole()" class="btn btn-success">Go to Role Management</button>
    </div>

    <div class="text-center mt-4">
        <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>

</div>

<script src="script.js"></script>

<script>
const roleValue = localStorage.getItem("role");
document.getElementById("userRole").innerText = roleValue;

// ✅ Hide department if not admin
if (roleValue !== "Admin") {
    document.getElementById("departmentSection").style.display = "none";
}

// Redirect to role page
function goRole() {
    window.location.href = "role.html";
}

// Logout
function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

</body>
</html>
