<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap for responsiveness -->
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
    alert("Access denied. Please login first.");
    window.location.href = "login.html";
}
</script>
<body>

<div class="container mt-4">

    <h2 class="text-center">HRM Dashboard</h2>

    <!-- Add Department Form -->
    <div class="card p-3 mt-4">
        <h4>Add Department</h4>
        <input type="text" id="dept_name" class="form-control mb-2" placeholder="Department Name">
        <input type="text" id="description" class="form-control mb-2" placeholder="Description">
        <button onclick="addDepartment()" class="btn btn-primary">Add</button>
        <a href="deleted.html">View Deleted Departments</a>
    </div>

    <!-- Department Table -->
    <div class="card p-3 mt-4">
        <h4>Departments</h4>

        <table class="table table-bordered mt-2">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="deptTable"></tbody>
        </table>
    </div>
    <div class="card p-3 mt-4">
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>
</div>

<script src="script.js"></script>
<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
    alert("Please login first");
    window.location.href = "login.html";
}
</script>

</body>
</html>
