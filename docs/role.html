<!DOCTYPE html>
<html>
<head>
<title>Role Management</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* CARD STYLE */
#addSection {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input {
    padding: 10px;
    margin: 8px 0;
    width: 30%;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BUTTON */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

/* COLORS */
button:hover {
    opacity: 0.85;
}

.edit-btn {
    background: #ffc107;
}

.delete-btn {
    background: #dc3545;
    color: white;
}

.restore-btn {
    background: #28a745;
    color: white;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #343a40;
    color: white;
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f1f1f1;
}
</style>

</head>

<body>
    <div class="container mt-3">
    <a href="dashboard.html" class="btn-back">
        <i class="bi bi-arrow-left-circle-fill"></i> Back to Dashboard
    </a>
</div>

<style>
.btn-back {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: #495057;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    border: 1px solid #dee2e6;
}

.btn-back i {
    font-size: 1.2rem;
    margin-right: 8px;
    color: #0d6efd; /* Matches your blue theme */
}

.btn-back:hover {
    background: #f8f9fa;
    transform: translateX(-5px); /* Subtle slide effect */
    color: #0d6efd;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
}
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<h2>Role Management</h2>

<div id="addSection">
<h3>Add Role</h3>
<input type="text" id="roleName" placeholder="Role Name">
<input type="text" id="roleDesc" placeholder="Role Description">
<input type="text" id="permissions" placeholder="Give Permission">
<button onclick="addRole()">Add Role</button>
</div>

<h3>Active Roles</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Permissions</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="roleTable"></tbody>
</table>

<h3>Deleted Roles</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Permissions</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="deletedRoleTable"></tbody>
</table>

<script>
const BASE_URL = "https://hrm-backend-al8a.onrender.com";
const role = localStorage.getItem("role");

// Permissions map
const permissionsMap = {
    "Admin": ["add", "edit", "delete"],
    "Manager": ["add", "view"],
    "Employee": ["view"]
};

const userPermissions = permissionsMap[role] || [];

// Hide add section if no add permission
if (!userPermissions.includes("add")) {
    document.getElementById("addSection").style.display = "none";
}

// 1. Load Active Roles
async function loadRoles() {
    const res = await fetch(`${BASE_URL}/get_roles`);
    const allData = await res.json();
    
    // FILTER: Only show roles where status is NOT deleted (if your backend sends all)
    // If your backend endpoint '/get_roles' already filters, just use allData
    const activeData = allData.filter(r => r.status !== 0); 

    let table = "";
    activeData.forEach(r => {
        let actions = "";
        if (userPermissions.includes("edit")) {
            actions += `<button class="edit-btn" onclick="editRole(${r.id}, '${r.name}', '${r.description}', '${r.permissions}')">Edit</button>`;
        }
        if (userPermissions.includes("delete")) {
            actions += `<button class="delete-btn" onclick="deleteRole(${r.id})">Delete</button>`;
        }

        table += `
        <tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.description || ""}</td>
            <td>${Array.isArray(r.permissions) ? r.permissions.join(", ") : r.permissions}</td>
            <td>${actions}</td>
        </tr>`;
    });
    document.getElementById("roleTable").innerHTML = table;
}

// 2. Load Deleted Roles
async function loadDeletedRoles() {
    try {
        const res = await fetch(`${BASE_URL}/get_deleted_roles`);
        const data = await res.json();

        let table = "";
        data.forEach(r => {
            table += `
            <tr>
                <td>${r.id}</td>
                <td>${r.name}</td>
                <td>${r.description || ""}</td>
                <td>${Array.isArray(r.permissions) ? r.permissions.join(", ") : r.permissions}</td>
                <td>
                    <button class="restore-btn" onclick="restoreRole(${r.id})">Restore</button>
                </td>
            </tr>`;
        });
        document.getElementById("deletedRoleTable").innerHTML = table;
    } catch (err) {
        console.log("No deleted roles found or error fetching.");
    }
}

// 3. Delete Function (Soft Delete)
async function deleteRole(id) {
    if(confirm("Move this role to deleted list?")) {
        await fetch(`${BASE_URL}/delete_role/${id}`, { method: "DELETE" });
        // Refresh both tables immediately
        loadRoles();
        loadDeletedRoles();
    }
}

// 4. Restore Function
async function restoreRole(id) {
    await fetch(`${BASE_URL}/restore_role/${id}`, { 
        method: "PUT",
        headers: {"Content-Type": "application/json"}
    });
    alert("Role Restored!");
    loadRoles();
    loadDeletedRoles();
}

// Initial Load
loadRoles();
loadDeletedRoles();
</script>

</body>
</html>
