<!DOCTYPE html>
<html>
<head>
<title>Role Management</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* CARD STYLE */
#addSection {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input {
    padding: 10px;
    margin: 8px 0;
    width: 30%;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BUTTON */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

/* COLORS */
button:hover {
    opacity: 0.85;
}

.edit-btn {
    background: #ffc107;
}

.delete-btn {
    background: #dc3545;
    color: white;
}

.restore-btn {
    background: #28a745;
    color: white;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #343a40;
    color: white;
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f1f1f1;
}
</style>

</head>

<body>

<h2>Role Management</h2>

<div id="addSection">
<h3>Add Role</h3>
<input type="text" id="roleName" placeholder="Role Name">
<input type="text" id="roleDesc" placeholder="Role Description">
<input type="text" id="permissions" placeholder="Give Permission">
<button onclick="addRole()">Add Role</button>
</div>

<h3>Active Roles</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Permissions</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="roleTable"></tbody>
</table>

<h3>Deleted Roles</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Permissions</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="deletedRoleTable"></tbody>
</table>

<script>
const BASE_URL = "https://hrm-backend-al8a.onrender.com";
const role = localStorage.getItem("role");

// Permissions map
const permissionsMap = {
    "Admin": ["add", "edit", "delete"],
    "Manager": ["add", "view"],
    "Employee": ["view"]
};

const userPermissions = permissionsMap[role] || [];

// Hide add section if no add permission
if (!userPermissions.includes("add")) {
    document.getElementById("addSection").style.display = "none";
}

// Load roles
async function loadRoles() {
    const res = await fetch(`${BASE_URL}/get_roles`);
    const data = await res.json();

    let table = "";

    data.forEach(r => {

        let actions = "";

        // ✅ EDIT (ADMIN ONLY)
        if (userPermissions.includes("edit")) {
            actions += `<button class="edit-btn" onclick="editRole(${r.id}, '${r.name}', '${r.description}', '${r.permissions}')">Edit</button>`;
        }

        // DELETE
        if (userPermissions.includes("delete")) {
            actions += `<button class="delete-btn" onclick="deleteRole(${r.id})">Delete</button>`;
        }

        table += `
        <tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.description || ""}</td>
            <td>${r.permissions.join(", ")}</td>
            <td>${actions}</td>
        </tr>`;
    });

    document.getElementById("roleTable").innerHTML = table;
}

// EDIT FUNCTION
function editRole(id, name, desc, permissions) {
    const newName = prompt("Enter new role name:", name);
    const newDesc = prompt("Enter description:", desc);
    const newPerm = prompt("Enter permissions (comma separated):", permissions);

    if (!newName) return;

    fetch(`${BASE_URL}/update_role/${id}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: newName,
            description: newDesc,
            permissions: newPerm.split(",").map(p => p.trim())
        })
    }).then(() => loadRoles());
}

// Deleted roles
async function loadDeletedRoles() {
    if (!userPermissions.includes("delete")) return;

    const res = await fetch(`${BASE_URL}/get_deleted_roles`);
    const data = await res.json();

    let table = "";

    data.forEach(r => {
        table += `
        <tr>
            <td>${r.id}</td>
            <td>${r.name}</td>
            <td>${r.description || ""}</td>
            <td>${r.permissions.join(", ")}</td>
            <td>
                <button class="restore-btn" onclick="restoreRole(${r.id})">Restore</button>
            </td>
        </tr>`;
    });

    document.getElementById("deletedRoleTable").innerHTML = table;
}

// Add role
async function addRole() {
    const name = document.getElementById("roleName").value;
    const desc = document.getElementById("roleDesc").value;
    const permissions = document.getElementById("permissions").value.split(",").map(p => p.trim());

    await fetch(`${BASE_URL}/add_role`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, description: desc, permissions })
    });

    loadRoles();
}

// Delete
async function deleteRole(id) {
    await fetch(`${BASE_URL}/delete_role/${id}`, { method: "DELETE" });
    loadRoles();
    loadDeletedRoles();
}

// Restore
async function restoreRole(id) {
    await fetch(`${BASE_URL}/restore_role/${id}`, { method: "PUT" });
    loadRoles();
    loadDeletedRoles();
}

loadRoles();
loadDeletedRoles();
</script>

</body>
</html>
