<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-3">
    <a href="dashboard.html" class="btn-back">
        <i class="bi bi-arrow-left-circle-fill"></i> Back to Dashboard
    </a>
</div>

<style>
.btn-back {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: #495057;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    border: 1px solid #dee2e6;
}

.btn-back i {
    font-size: 1.2rem;
    margin-right: 8px;
    color: #0d6efd; /* Matches your blue theme */
}

.btn-back:hover {
    background: #f8f9fa;
    transform: translateX(-5px); /* Subtle slide effect */
    color: #0d6efd;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
}
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <div class="container mt-4">
        <div class="d-flex justify-content-between">
            <h2>Leave Dashboard</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#applyLeaveModal">Apply Leave</button>
        </div>

        <div class="row mt-4 mb-4 text-center">
            <div class="col-md-4"><div class="card p-3 bg-white shadow-sm"><h5>PL Balance</h5><h2 id="q-PL">0</h2></div></div>
            <div class="col-md-4"><div class="card p-3 bg-white shadow-sm"><h5>CL Balance</h5><h2 id="q-CL">0</h2></div></div>
            <div class="col-md-4"><div class="card p-3 bg-white shadow-sm"><h5>SL Balance</h5><h2 id="q-SL">0</h2></div></div>
        </div>

        <div class="card shadow-sm"><div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Sr.No</th><th>Reason</th><th>Type</th><th>From</th><th>To</th><th>Status</th></tr>
                </thead>
                <tbody id="leaveTableBody"></tbody>
            </table>
        </div></div>
    </div>

    <div class="modal fade" id="applyLeaveModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5>Apply Leave</h5></div>
            <div class="modal-body">
                <form id="leaveForm" onsubmit="handleLeaveSubmit(event)">
                    <div class="mb-3"><label>Leave Type</label>
                        <select id="leave_type" class="form-select" required>
                            <option value="PL">PL (Paid Leave)</option><option value="CL">CL (Casual Leave)</option><option value="SL">SL (Sick Leave)</option>
                        </select>
                    </div>
                    <div class="mb-3"><label>Reason</label><input type="text" id="leave_reason" class="form-control" required></div>
                    <div class="mb-3"><label>From</label><input type="date" id="leave_from" class="form-control" required></div>
                    <div class="mb-3"><label>To</label><input type="date" id="leave_to" class="form-control" required></div>
                    <button type="submit" class="btn btn-success w-100">Apply</button>
                </form>
            </div>
        </div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="leave.js"></script>
</body>
</html>
