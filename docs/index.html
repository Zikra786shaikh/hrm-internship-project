<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .forgot {
            font-size: 14px;
            color: #667eea;
            cursor: pointer;
            margin-top: 10px;
            display: block;
        }

        .forgot:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>HRM Login</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- ✅ Added Forgot Password Link -->
    <span class="forgot" onclick="goToForgot()">Forgot Password?</span>

    <p id="message"></p>
</div>

<script>
const API = "https://hrm-backend-al8a.onrender.com";

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    // ✅ Store username (useful later if needed)
    localStorage.setItem("username", username);

    let response = await fetch(`${API}/admin_login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    let data;

    try {
        data = await response.json();
    } catch (err) {
        document.getElementById("message").innerText = "Server error";
        return;
    }

    if (response.status !== 200) {
        document.getElementById("message").innerText = "Invalid login";
        return;
    }

    // ✅ Existing logic unchanged
    localStorage.setItem("role", data.role);

    document.getElementById("message").innerText = "Login success";

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 800);
});

// ✅ Navigate to forgot password page
function goToForgot(){
    window.location.href = "forgot.html";
}
</script>

</body>
</html>
