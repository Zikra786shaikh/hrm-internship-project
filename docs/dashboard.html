<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body {
    background: #f4f6f9;
}

.card {
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

h2 {
    font-weight: bold;
}

/* NAV BUTTONS */
.btn-success {
    background: #28a745;
}

.btn-warning {
    background: #ffc107;
}

.btn-danger {
    background: #dc3545;
}

/* TABLE */
.table {
    background: white;
}
    </style>
</head>

<body>

<script>
const role = localStorage.getItem("role");

if (!role) {
    alert("Please login first");
    window.location.href = "index.html";
}
</script>

<div class="container mt-4">

    <h2 class="text-center">HRM Dashboard</h2>

    <div class="text-center mt-3">
        <h5>Logged in as: <span id="userRole"></span></h5>
    </div>

    <!-- ================= DEPARTMENT ================= -->
    <div class="card p-3 mt-4">
        <h4>Department Management</h4>

        <!-- 🔹 ADD FORM (ONLY ADMIN) -->
        <div id="addSection">
            <input type="text" id="dept_name" class="form-control mb-2" placeholder="Department Name">
            <input type="text" id="description" class="form-control mb-2" placeholder="Description">
            <button onclick="addDepartment()" class="btn btn-primary mb-2">Add</button>
        </div>

        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th id="actionHeader">Actions</th>
                </tr>
            </thead>
            <tbody id="deptTable"></tbody>
        </table>
    </div>

    <!-- ================= NAV ================= -->
    <div class="text-center mt-4">
        <button onclick="goRole()" class="btn btn-success m-2">Role Management</button>
        <button onclick="goEmployee()" class="btn btn-warning m-2">Employee Management</button>
    <button onclick="goTasks()" class="btn btn-info m-2 text-white" style="background-color: #17a2b8;">Task Management</button>
</div>

<script>
// Add this function to your NAV script section
function goTasks() {
    window.location.href = "task_dashboard.html";
}
</script>
    </div>

    <div class="text-center mt-4">
        <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>

</div>

<script>
const API = "https://hrm-backend-al8a.onrender.com";
const roleValue = localStorage.getItem("role");

document.getElementById("userRole").innerText = roleValue;

// ================= LOAD DEPARTMENTS =================
async function loadDepartments() {

    let res = await fetch(API + "/departments");
    let data = await res.json();

    let table = document.getElementById("deptTable");
    table.innerHTML = "";

    data.forEach(d => {

        let actionButtons = "";

        // ✅ ONLY ADMIN gets actions
        if (roleValue === "Admin") {
            actionButtons = `
                <button onclick="editDept(${d.dept_id}, '${d.dept_name}', '${d.description}')" class="btn btn-sm btn-warning">Edit</button>
                <button onclick="deleteDept(${d.dept_id})" class="btn btn-sm btn-danger">Delete</button>
            `;
        }

        table.innerHTML += `
            <tr>
                <td>${d.dept_id}</td>
                <td>${d.dept_name}</td>
                <td>${d.description}</td>
                <td>${actionButtons}</td>
            </tr>
        `;
    });
}

// ================= ADD =================
async function addDepartment() {

    let name = document.getElementById("dept_name").value;
    let desc = document.getElementById("description").value;

    await fetch(API + "/add_department", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            dept_name: name,
            description: desc
        })
    });

    loadDepartments();
}

// ================= DELETE =================
async function deleteDept(id) {
    await fetch(API + "/delete_department/" + id, { method: "DELETE" });
    loadDepartments();
}

// ================= EDIT =================
let editId = null;

function editDept(id, name, desc) {
    document.getElementById("dept_name").value = name;
    document.getElementById("description").value = desc;
    editId = id;
}

// Modify Add to Update
document.querySelector(".btn-primary").addEventListener("click", async function () {

    if (editId) {
        await fetch(API + "/update_department/" + editId, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                dept_name: dept_name.value,
                description: description.value
            })
        });

        editId = null;
    }

});

// ================= RBAC =================
if (roleValue !== "Admin") {
    document.getElementById("addSection").style.display = "none";
    document.getElementById("actionHeader").style.display = "none";
}

// ================= NAV =================
function goRole() {
    window.location.href = "role.html";
}

function goEmployee() {
    if (roleValue === "Employee") {
        alert("Access Denied");
        return;
    }
    window.location.href = "employee.html";
}

function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}

// INIT
loadDepartments();

// Add this function to the bottom script section of dashboard.html
function goTasks() {
    window.location.href = "task_dashboard.html";
}


</script>

</body>
</html>
