<!DOCTYPE html>
<html>
<head>
    <title>Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h2>Task Dashboard</h2>
    <div class="row mb-3">
        <div class="col-md-3">Total: <span id="stat-total">0</span></div>
        <div class="col-md-3 text-warning">Pending: <span id="stat-pending">0</span></div>
        <div class="col-md-3 text-success">Completed: <span id="stat-completed">0</span></div>
    </div>
    
    <table class="table table-striped">
        <thead>
            <tr><th>Sr.No</th><th>Employee</th><th>Title</th><th>Status</th></tr>
        </thead>
        <tbody id="taskBody"></tbody>
    </table>

    <script>
        const API = "https://hrm-backend-al8a.onrender.com";
        async function load() {
            const uid = localStorage.getItem("user_id");
            const role = localStorage.getItem("role");
            const res = await fetch(`${API}/get_dashboard_tasks?user_id=${uid}&role=${role}`);
            const data = await res.json();
            
            document.getElementById("stat-total").innerText = data.statistics.total;
            document.getElementById("stat-pending").innerText = data.statistics.pending;
            document.getElementById("stat-completed").innerText = data.statistics.completed;
            
            document.getElementById("taskBody").innerHTML = data.tasks.map((t, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${t.employee_name}</td>
                    <td>${t.task_title}</td>
                    <td>${t.status}</td>
                </tr>
            `).join("");
        }
        load();
    </script>
</body>
</html>
