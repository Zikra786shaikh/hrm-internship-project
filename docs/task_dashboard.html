<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRM - Task Management</title>
    <link rel="stylesheet" href="../css/style.css"> </head>
<body>
    <div class="dashboard-container">
        <h2>Task Management Dashboard</h2>

        <div class="row text-center mb-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3">
            <h5>Total Tasks</h5>
            <h2 id="stat-total">0</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-warning text-dark p-3">
            <h5>Pending</h5>
            <h2 id="stat-pending">0</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-success text-white p-3">
            <h5>Completed</h5>
            <h2 id="stat-completed">0</h2>
        </div>
    </div>
</div>

        <button onclick="openTaskModal()">+ Create Task</button>

        <div class="filter-bar">
            <select id="filterEmployee" onchange="loadTasks()">
                <option value="">Filter By Employee</option>
            </select>
            <select id="filterStatus" onchange="loadTasks()">
                <option value="">Filter By Status</option>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
            <input type="date" id="fromDate" onchange="loadTasks()">
            <input type="date" id="toDate" onchange="loadTasks()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Sr.No</th>
                    <th>Employee Name</th>
                    <th>Task Title</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
        </table>

        <div id="pagination"></div>
    </div>

    <div id="taskModal" style="display:none;">
        <form id="taskForm">
            <input type="text" id="task_title" placeholder="Task Title" required>
            <textarea id="task_description" placeholder="Description"></textarea>
            <select id="task_priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <select id="assigned_to" required>
                </select>
            <input type="date" id="start_date" required>
            <input type="date" id="end_date" required>
            <select id="task_type">
                <option value="Individual">Individual</option>
                <option value="Team">Team</option>
            </select>
            <button type="submit">Create Task</button>
            <button type="button" onclick="closeTaskModal()">Cancel</button>
        </form>
    </div>

    <script src="../js/task.js"></script>
</body>
</html>
